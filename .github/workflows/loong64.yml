name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract plugins branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          RAW_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "RAW_VERSION=$RAW_VERSION"
          PLUGINS_BRANCH=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "PLUGINS_BRANCH=$PLUGINS_BRANCH"
          echo "PLUGINS_BRANCH=$PLUGINS_BRANCH" >> ${GITHUB_ENV}
          if echo "$RAW_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Install build tools
        run: |
          apt update
          apt install -y git golang file rpm
      - name: Clone plugins
        run: |
          git clone --branch ${{ env.PLUGINS_BRANCH }} --depth 1 https://github.com/containernetworking/plugins.git plugins
      - name: ls
        run: ls -lah
      #- name: Apply patches
      #  working-directory: plugins
      #  run: git apply ../*.patch
      - name: Build plugins
        working-directory: plugins
        env:
          GOOS: linux
          GOARCH: loong64
        run: ./build_linux.sh
      - name: Print binary SHA-256 checksums
        working-directory: plugins
        run: |
          find bin -type f | xargs sha256sum
      - name: Inspect binary file types
        working-directory: plugins
        run: |
          echo "=== bin ==="
          file bin/*
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugins-loong64-binaries
          path: |
            plugins/bin/*

      - name: Build kubernetes-cni RPM
        run: |
          RPM_VERSION=$(echo "${{ env.PLUGINS_BRANCH }}" | sed 's/^v//')
          RELEASE=${{ github.run_number }}

          echo "Building kubernetes-cni RPM version ${RPM_VERSION}-${RELEASE}"

          RPMBUILD_DIR=~/rpmbuild
          mkdir -p ${RPMBUILD_DIR}/{SPECS,RPMS,SRPMS,BUILD,BUILDROOT}

          # Copy binaries to BUILD directory for %install to find
          mkdir -p ${RPMBUILD_DIR}/BUILD/loong64
          cp plugins/bin/* ${RPMBUILD_DIR}/BUILD/loong64/

          cp templates/latest/kubernetes-cni/kubernetes-cni.spec ${RPMBUILD_DIR}/SPECS/

          # Build RPM for loongarch64 target
          rpmbuild -ba ${RPMBUILD_DIR}/SPECS/kubernetes-cni.spec \
            --define "_topdir ${RPMBUILD_DIR}" \
            --define "version ${RPM_VERSION}" \
            --define "release ${RELEASE}" \
            --define "kube_arch loong64" \
            --target loongarch64-linux

          RPM_FILE=$(find ${RPMBUILD_DIR}/RPMS -type f -name '*.rpm' | head -1)
          echo "RPM_FILE=${RPM_FILE}"
          sha256sum ${RPM_FILE}
          echo "=== RPM package info ==="
          rpm -qpi ${RPM_FILE}
          echo "=== RPM package contents ==="
          mkdir -p ${RPMBUILD_DIR}/rpm-extract
          cd ${RPMBUILD_DIR}/rpm-extract
          rpm2cpio ${RPM_FILE} | cpio -idmv
          cd -
      - name: Upload kubernetes-cni RPM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-cni-loong64-rpm
          path: |
            ~/rpmbuild/RPMS/**/*.rpm
