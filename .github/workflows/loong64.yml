name: loong64
on:
  push:
    branches:
      - loong64-*
    tags:
      - release-loong64-*
  pull_request:
    branches:
      - loong64-*

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      RAW_VERSION: ${{ steps.extract.outputs.RAW_VERSION }}
      PLUGINS_BRANCH: ${{ steps.extract.outputs.PLUGINS_BRANCH }}
      RELEASE: ${{ steps.extract.outputs.RELEASE }}
      IS_STABLE: ${{ steps.extract.outputs.IS_STABLE }}
      VERSION: ${{ steps.extract.outputs.VERSION }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Print branch name
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "${{ github.base_ref }} (PR target)"
          else
            echo ${{ github.ref_name }}
          fi
      - name: Extract plugins branch
        id: extract
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REF=${{ github.base_ref }}
          else
            REF=${{ github.ref_name }}
          fi
          echo "REF=$REF"
          RAW_VERSION=$(echo $REF | awk -F'loong64-' '{print $2}')
          echo "RAW_VERSION=$RAW_VERSION"
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_ENV}
          echo "RAW_VERSION=$RAW_VERSION" >> ${GITHUB_OUTPUT}
          PLUGINS_BRANCH=$(echo $RAW_VERSION | awk -F'+' '{print $1}')
          echo "PLUGINS_BRANCH=$PLUGINS_BRANCH"
          echo "PLUGINS_BRANCH=$PLUGINS_BRANCH" >> ${GITHUB_ENV}
          echo "PLUGINS_BRANCH=$PLUGINS_BRANCH" >> ${GITHUB_OUTPUT}
          VERSION=$(echo $PLUGINS_BRANCH | awk -F'v' '{print $2}')
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> ${GITHUB_ENV}
          echo "VERSION=$VERSION" >> ${GITHUB_OUTPUT}
          RELEASE=$(echo $RAW_VERSION | awk -F'+' '{print $2}')
          RELEASE=${RELEASE:-alpha.${{ github.run_number }}}
          echo "RELEASE=$RELEASE"
          echo "RELEASE=$RELEASE" >> ${GITHUB_ENV}
          echo "RELEASE=$RELEASE" >> ${GITHUB_OUTPUT}
          if echo "$RAW_VERSION" | grep -qE '[+].*(alpha|beta|rc)'; then
            IS_STABLE=false
          else
            IS_STABLE=true
          fi
          echo "IS_STABLE=$IS_STABLE"
          echo "IS_STABLE=$IS_STABLE" >> ${GITHUB_OUTPUT}
      - name: Install build tools
        run: |
          apt update
          apt install -y git golang file rpm
      - name: Clone plugins
        run: |
          git clone --branch ${{ env.PLUGINS_BRANCH }} --depth 1 https://github.com/containernetworking/plugins.git plugins
      - name: ls
        run: ls -lah
      - name: Install Docker CLI
        run: |
          apt remove $(dpkg --get-selections docker.io docker-compose docker-doc podman-docker containerd runc | cut -f1)
          apt update
          apt install -y ca-certificates curl
          install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
          chmod a+r /etc/apt/keyrings/docker.asc
          # Add the repository to Apt sources:
          tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/debian
          Suites: $(. /etc/os-release && echo "$VERSION_CODENAME")
          Components: stable
          Architectures: $(dpkg --print-architecture)
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF
          apt update
          apt install -y docker-ce-cli
      - name: Verify Docker installation
        run: |
          ls -la /run/docker.sock 2>/dev/null || echo "/run/docker.sock not found"
          echo "DOCKER_HOST=$DOCKER_HOST"
          docker info
      #- name: Apply patches
      #  working-directory: plugins
      #  run: git apply ../*.patch
      - name: Build plugins
        working-directory: plugins
        env:
          GOOS: linux
          GOARCH: loong64
        run: ./build_linux.sh
      - name: Print binary SHA-256 checksums
        working-directory: plugins
        run: |
          find bin -type f | xargs sha256sum
      - name: Inspect binary file types
        working-directory: plugins
        run: |
          echo "=== bin ==="
          file bin/*
      - name: Upload binaries
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plugins-loong64-binaries
          path: |
            plugins/bin/*
      - name: Install QEMU binfmt for loong64
        run: |
          docker run --privileged --rm ghcr.io/loong64/binfmt --install all
      - name: Print docker version
        run: |
          plugins/bin/bandwidth -v
          plugins/bin/bandwidth -v
          plugins/bin/bridge -v
          plugins/bin/dhcp -v
          plugins/bin/dummy -v
          plugins/bin/firewall -v
          plugins/bin/host-device -v
          plugins/bin/host-local -v
          plugins/bin/ipvlan -v
          plugins/bin/loopback -v
          plugins/bin/macvlan -v
          plugins/bin/portmap -v
          plugins/bin/ptp -v
          plugins/bin/sbr -v
          plugins/bin/static -v
          plugins/bin/tap -v
          plugins/bin/tuning -v
          plugins/bin/vlan -v
          plugins/bin/vrf -v

  rpm-anolis:
    needs: build
    runs-on: ubuntu-latest
    container: openanolis/anolisos:23
    outputs:
      ANOLIS_RPM_NAME: ${{ steps.rpm-file.outputs.ANOLIS_RPM_NAME }}
      ANOLIS_VERSION: ${{ steps.extract-version.outputs.ANOLIS_VERSION }}
    permissions:
      contents: read
    env:
      RAW_VERSION: ${{ needs.build.outputs.RAW_VERSION }}
      PLUGINS_BRANCH: ${{ needs.build.outputs.PLUGINS_BRANCH }}
      RELEASE: ${{ needs.build.outputs.RELEASE }}
      ARCH: loongarch64
      VERSION: ${{ needs.build.outputs.VERSION }}
    steps:
      - name: Install gzip
        run: yum install -y gzip
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Extract version
        id: extract-version
        run: |
          DIST=$(rpm --eval '%{dist}')
          echo "DIST=$DIST"
          echo "DIST=$DIST" >> ${GITHUB_ENV}
          ANOLIS_VERSION=$(cat /etc/anolis-release | awk '{print $4}' | cut -d'.' -f1)
          echo "ANOLIS_VERSION=$ANOLIS_VERSION"
          echo "ANOLIS_VERSION=$ANOLIS_VERSION" >> ${GITHUB_OUTPUT}
          echo "ANOLIS_VERSION=$ANOLIS_VERSION" >> ${GITHUB_ENV}
      - name: Install build tools
        run: yum install -y rpm-build rpmdevtools
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugins-loong64-binaries
          path: artifacts
      - name: Build RPM
        run: |
          rm -rf ~/rpmbuild
          rpmdev-setuptree
          mkdir -p ~/rpmbuild/BUILD/loong64
          cp artifacts/* ~/rpmbuild/BUILD/loong64/
          cp templates/latest/kubernetes-cni/kubernetes-cni.spec ~/rpmbuild/SPECS/
          rpmbuild -ba --target ${{ env.ARCH }} ~/rpmbuild/SPECS/kubernetes-cni.spec \
            --define "version ${{ env.VERSION }}" \
            --define "release ${{ env.RELEASE }}" \
            --define "kube_arch loong64"
          mkdir -p rpms
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp -t rpms {} +
          find ~/rpmbuild/SRPMS -name '*.src.rpm' -exec cp -t rpms {} +
      - name: List RPM files
        id: rpm-file
        run: |
          ANOLIS_RPM_NAME=kubernetes-cni-${{ env.VERSION }}-${{ env.RELEASE }}${{ env.DIST }}.${{ env.ARCH }}.rpm
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME"
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME" >> $GITHUB_OUTPUT
          echo "ANOLIS_RPM_NAME=$ANOLIS_RPM_NAME" >> $GITHUB_ENV
          echo "=== RPM file name: $ANOLIS_RPM_NAME ==="
          sha256sum rpms/$ANOLIS_RPM_NAME
          echo "=== RPM info ==="
          rpm -qpi rpms/$ANOLIS_RPM_NAME
          echo "=== RPM contents ==="
          rpm2cpio rpms/$ANOLIS_RPM_NAME | cpio -it
      - name: Upload RPM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-cni-loong64-rpm
          path: |
            rpms/${{ env.ANOLIS_RPM_NAME }}
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/rpm-anolis-os-release.txt
          cat /tmp/rpm-anolis-os-release.txt
      - name: Export installed packages
        run: |
          rpm -qa --queryformat '%{NAME}\t%{VERSION}\t%{RELEASE}\t%{ARCH}\n' | column -t -s $'\t' | sort -f > /tmp/rpm-anolis-installed-packages-rpm.txt
          cat /tmp/rpm-anolis-installed-packages-rpm.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-cni-loong64-rpm-system-info
          path: |
            /tmp/rpm-anolis-installed-packages-rpm.txt
            /tmp/rpm-anolis-os-release.txt

  deb-debian:
    needs: build
    runs-on: ubuntu-latest
    container: debian:13
    outputs:
      DEBIAN_DEB_NAME: ${{ steps.deb-file.outputs.DEBIAN_DEB_NAME }}
      DEBIAN_VERSION_CODENAME: ${{ steps.extract-version.outputs.DEBIAN_VERSION_CODENAME }}
    permissions:
      contents: read
    env:
      RAW_VERSION: ${{ needs.build.outputs.RAW_VERSION }}
      PLUGINS_BRANCH: ${{ needs.build.outputs.PLUGINS_BRANCH }}
      RELEASE: ${{ needs.build.outputs.RELEASE }}
      ARCH: loong64
      VERSION: ${{ needs.build.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install build tools
        run: |
          apt update
          apt install -y file
      - name: Extract version
        id: extract-version
        run: |
          ID_VERSION_ID=$(sh -c '. /etc/os-release && echo "${ID}.${VERSION_ID}"')
          echo "ID_VERSION_ID=$ID_VERSION_ID"
          echo "ID_VERSION_ID=$ID_VERSION_ID" >> ${GITHUB_ENV}
          DEBIAN_VERSION_CODENAME=$(sh -c '. /etc/os-release && echo "${VERSION_CODENAME}"')
          echo "DEBIAN_VERSION_CODENAME=$DEBIAN_VERSION_CODENAME"
          echo "DEBIAN_VERSION_CODENAME=$DEBIAN_VERSION_CODENAME" >> ${GITHUB_OUTPUT}
          echo "DEBIAN_VERSION_CODENAME=$DEBIAN_VERSION_CODENAME" >> ${GITHUB_ENV}
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugins-loong64-binaries
          path: artifacts
      - name: Build DEB
        run: |
          PKG_ROOT=$(mktemp -d)
          mkdir -p $PKG_ROOT/opt/cni/bin
          mkdir -p $PKG_ROOT/etc/cni/net.d
          mkdir -p $PKG_ROOT/DEBIAN

          install -m 755 artifacts/* $PKG_ROOT/opt/cni/bin/
          touch $PKG_ROOT/etc/cni/net.d/.kubernetes-cni-keep

          cat > $PKG_ROOT/DEBIAN/control << EOF
          Package: kubernetes-cni
          Version: ${{ env.VERSION }}-${{ env.RELEASE }}~${{ env.ID_VERSION_ID }}~${{ env.DEBIAN_VERSION_CODENAME }}
          Architecture: ${{ env.ARCH }}
          Maintainer: 徐晓伟 <xuxiaowei@xuxiaowei.com.cn>
          Description: Binaries required to provision kubernetes container networking
           Kubernetes CNI plugins for the loong64 (LoongArch) architecture.
          Homepage: https://github.com/containernetworking/plugins
          Section: net
          Priority: optional
          EOF

          mkdir -p debs
          dpkg-deb --build $PKG_ROOT debs/

          find debs -name '*.deb'
          # Rename: replace ~ with . in filename (GitHub releases / URLs don't like ~)
          for f in debs/*.deb; do
            new_name=$(echo "$f" | tr '~' '.')
            if [ "$f" != "$new_name" ]; then
              mv "$f" "$new_name"
              echo "Renamed: $f -> $new_name"
            fi
          done
      - name: List DEB files
        id: deb-file
        run: |
          DEBIAN_DEB_NAME=kubernetes-cni_${{ env.VERSION }}-${{ env.RELEASE }}.${{ env.ID_VERSION_ID }}.${{ env.DEBIAN_VERSION_CODENAME }}_${{ env.ARCH }}.deb
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME"
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME" >> $GITHUB_OUTPUT
          echo "DEBIAN_DEB_NAME=$DEBIAN_DEB_NAME" >> $GITHUB_ENV
          echo "=== DEB file name: $DEBIAN_DEB_NAME ==="
          sha256sum debs/$DEBIAN_DEB_NAME
          echo "=== DEB info ==="
          dpkg --info debs/$DEBIAN_DEB_NAME
          echo "=== DEB contents ==="
          dpkg --contents debs/$DEBIAN_DEB_NAME
      - name: Upload DEB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-cni-loong64-deb
          path: |
            debs/${{ env.DEBIAN_DEB_NAME }}
      - name: Export system version
        run: |
          cat /etc/os-release > /tmp/deb-debian-os-release.txt
          cat /tmp/deb-debian-os-release.txt
      - name: Export installed packages
        run: |
          dpkg -l > /tmp/deb-debian-installed-packages-packages.txt
          cat /tmp/deb-debian-installed-packages-packages.txt
      - name: Upload system info
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubernetes-cni-loong64-deb-system-info
          path: |
            /tmp/deb-debian-installed-packages-packages.txt
            /tmp/deb-debian-os-release.txt

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, rpm-anolis, deb-debian]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
      ANOLIS_RPM_NAME: ${{ needs.rpm-anolis.outputs.ANOLIS_RPM_NAME }}
      DEBIAN_DEB_NAME: ${{ needs.deb-debian.outputs.DEBIAN_DEB_NAME }}
      IS_STABLE: ${{ needs.build.outputs.IS_STABLE }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: plugins-loong64-binaries
          path: loong64-artifacts
      - name: Download RPM system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-cni-loong64-rpm-system-info
          path: loong64-artifacts
      - name: Download DEB system info
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-cni-loong64-deb-system-info
          path: loong64-artifacts
      - name: Download RPM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-cni-loong64-rpm
          path: loong64-artifacts
      - name: Download DEB
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: kubernetes-cni-loong64-deb
          path: loong64-artifacts
      - name: List release artifacts
        run: |
          find loong64-artifacts -type f
      - name: Generate release body
        run: |
          cat > release-body.md <<'BODYEOF'
          ## Artifacts

          | File                         | Download                                                                         |
          |------------------------------|----------------------------------------------------------------------------------|
          | CNI plugins (binaries)       | [plugins-loong64-binaries.zip](${{ env.BASE_URL }}/plugins-loong64-binaries.zip) |
          | `${{ env.ANOLIS_RPM_NAME }}` | [${{ env.ANOLIS_RPM_NAME }}](${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }})     |
          | `${{ env.DEBIAN_DEB_NAME }}` | [${{ env.DEBIAN_DEB_NAME }}](${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }})     |

          ```shell
          # RPM (Anolis)
          curl -LO ${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}
          curl -LO ${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}.asc

          # DEB (Debian)
          curl -LO ${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}
          curl -LO ${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}.asc
          ```
          BODYEOF
      - name: Create Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ github.ref_name }}
          body_path: release-body.md
          prerelease: ${{ env.IS_STABLE == 'false' }}
          make_latest: ${{ env.IS_STABLE == 'true' && 'legacy' || 'false' }}
          files: |
            loong64-artifacts/**

  trigger-gitlab:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, rpm-anolis, deb-debian, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IS_STABLE: ${{ needs.build.outputs.IS_STABLE }}
      BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}
      ANOLIS_RPM_NAME: ${{ needs.rpm-anolis.outputs.ANOLIS_RPM_NAME }}
      ANOLIS_VERSION: ${{ needs.rpm-anolis.outputs.ANOLIS_VERSION }}
      DEBIAN_DEB_NAME: ${{ needs.deb-debian.outputs.DEBIAN_DEB_NAME }}
      DEBIAN_VERSION_CODENAME: ${{ needs.deb-debian.outputs.DEBIAN_VERSION_CODENAME }}
      GITLAB_API_URL: ${{ vars.GITLAB_API_URL || 'https://gitlab.xuxiaowei.com.cn' }}
      GITLAB_PROJECT_ID: ${{ vars.GITLAB_PROJECT_ID || '590' }}
      GITLAB_REF: ${{ vars.GITLAB_REF || 'sync' }}
    steps:
      - name: Trigger GitLab CI
        env:
          ANOLIS_RPM_URL: ${{ env.BASE_URL }}/${{ env.ANOLIS_RPM_NAME }}
          DEBIAN_DEB_URL: ${{ env.BASE_URL }}/${{ env.DEBIAN_DEB_NAME }}
        run: |
          curl -X POST \
          --fail \
          -F token=${{ secrets.GITLAB_TRIGGER_TOKEN }} \
          -F ref=${{ env.GITLAB_REF }} \
          -F "variables[ANOLIS_VERSION]=${{ env.ANOLIS_VERSION }}" \
          -F "variables[DEBIAN_VERSION_CODENAME]=${{ env.DEBIAN_VERSION_CODENAME }}" \
          -F "variables[IS_STABLE]=${{ env.IS_STABLE }}" \
          -F "variables[ANOLIS_RPM_URL]=${{ env.ANOLIS_RPM_URL }}" \
          -F "variables[DEBIAN_DEB_URL]=${{ env.DEBIAN_DEB_URL }}" \
          ${{ env.GITLAB_API_URL }}/api/v4/projects/${{ env.GITLAB_PROJECT_ID }}/trigger/pipeline
